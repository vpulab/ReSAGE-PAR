# LoRA Training Configuration
# Usage: python src/lora_training/train_lora.py --config configs/lora.yaml

# Experiment name
name: "example_lora"

# Model configuration
model:
  # Required: Base model (HuggingFace model ID or local path)
  pretrained_model_name_or_path: "../../stablediffusionmodel/models--stabilityai--stable-diffusion-2-1/snapshots/5cae40e6a2745ae2b01ad92ae5043f95f23644d6/"
  # Optional: Model revision
  # revision: null
  # Optional: Model variant (e.g., fp16)
  # variant: null

# Training configuration
training:
  # Optional: Dataset name (HuggingFace dataset)
  dataset_name: RAPzs
  # Optional: Dataset config name
  # dataset_config_name: null
  
  # Optional: Local training data directory (alternative to dataset_name)
  # train_data_dir: null
  
  # Optional: Column names
  # image_column: "image"
  # caption_column: "text"
  
  # Validation parameters
  # validation_prompt: null
  # num_validation_images: 4
  # num_final_validation_images: 500
  # validation_epochs: 1
  
  # Training samples (debugging)
  # max_train_samples: null
  
  # Training parameters
  train_batch_size: 92
  num_train_epochs: 20
  learning_rate: 1e-4
  
  # Training steps
  # max_train_steps: null
  # gradient_accumulation_steps: 1
  # gradient_checkpointing: false
  
  # Learning rate scheduler
  # lr_scheduler: "constant"
  # lr_warmup_steps: 500
  # snr_gamma: null
  
  # Scale learning rate
  # scale_lr: false
  
  # Image parameters
  height: 256
  width: 192
  transform: True
  center_crop: false
  random_flip: false
  
  # LoRA parameters
  rank: 4
  
  # Optimizer parameters
  # use_8bit_adam: false
  # allow_tf32: false
  # dataloader_num_workers: 0
  # adam_beta1: 0.9
  # adam_beta2: 0.999
  # adam_weight_decay: 0.01
  # adam_epsilon: 1e-08
  # max_grad_norm: 1.0
  
  # Prediction type
  # prediction_type: null
  
  # xformers
  # enable_xformers_memory_efficient_attention: false
  
  # Noise offset
  # noise_offset: 0
  
  # Checkpointing
  # checkpointing_steps: 500
  # checkpoints_total_limit: null
  # resume_from_checkpoint: null
  
  # Cache
  # cache_dir: null
  
  # Seed
  # seed: null

# Output configuration
output:
  # Output directory where model and checkpoints will be saved
  output_dir: "rapzs_lora_4_with_transform_256_192_loss_train_model_21"
  
  # Logging
  logging_dir: "logs"
  
  # Optional: HuggingFace Hub settings
  # push_to_hub: false
  # hub_model_id: null
  # hub_token: null
  
  # Mixed precision (no, fp16, bf16)
  # mixed_precision: null
  
  # Reporting (tensorboard, wandb, comet_ml, all)
  # report_to: "tensorboard"
  
  # MLflow
  # use_mlflow: false

  # use_mlflow: false
