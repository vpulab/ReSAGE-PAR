# Stage C: Train Classifier
# Usage: python -m src.stage_c_pseudolabeling.run_stage_c --config configs/stage_c_train.yaml

mode: "train"

# Dataset and scoring configuration
dataset: "RAPzs"
prompting: "fixed-rule"
score_name: "blip"
strategy: "identity"

# Optional custom dataset paths
# Uncomment and set these to use custom paths instead of defaults
# dataset:
#   path_dataset: "/path/to/custom/dataset/"
#   path_gt: "/path/to/custom/dataset_all.pkl"
#   path_gt_img: "/path/to/custom/images/"

# Classifier configuration
classifier: "bayes"
bayes_mode: "gauss"
# Optional classifier parameters
# prior_pos: 0.5           # Bayes prior for positive class (0-1)
# kde_bandwidth: "scott"   # KDE bandwidth (float or 'scott')

# Decision threshold
threshold: 0.5

# LoRA directory (base directory for Stage B/C outputs)
lora_dir: "rapzs_lora_4_with_transform_256_192_loss_train_model_21"

# Labeling policy
labeling_policy: "hardlabelling"

# Training parameters
random_state: 42
val_frac: 0.2
