name: stage_b
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.11  
  - cudatoolkit=11.8
  # Install PyTorch from the official conda channels so the CUDA runtime matches
  - pytorch>=2.6.0
  - torchvision
  - torchaudio
  - pytorch-cuda=11.8
  - pip
  - pip:
    # torch / torchvision / torchaudio are installed via conda to ensure CUDA compatibility
    # Other python packages installed via pip:
    - transformers==4.54.1
    - accelerate==1.9.0
    - huggingface-hub==0.34.3
    - tokenizers==0.21.4
    - numpy==2.1.2
    - pandas==2.3.1
    - opencv-python-headless==4.12.0.88
    - Pillow==11.0.0
    - tqdm==4.67.1
    - requests==2.32.4
    - openpyxl==3.1.5
    - pyyaml
    - packaging
    - filelock
    - safetensors
    - datasets
    - peft         
    - diffusers