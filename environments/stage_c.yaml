  - defaults
dependencies:
  - python=3.10
  - numpy>=1.23
  - pandas>=1.5
  - openpyxl>=3.1
  - pyyaml>=6
  - scikit-learn>=1.1
  - pip
  - pip:
      # Pytorch CUDA 11.8 wheels
      - --index-url https://download.pytorch.org/whl/cu118
      - torch==2.7.1
      - torchvision==0.22.1
      - torchaudio==2.7.1

      # Resto de deps pip
      - transformers==4.54.1
      - accelerate==1.9.0
      - huggingface-hub==0.34.3
      - tokenizers==0.21.4
      - opencv-python-headless
      - easydict
      # OJO: normalmente NO hace falta en Python 3.10 y puede dar guerra
      # - pickle5

