NAME: 'resnet50.base.adam'


SYNTHETIC:
  USE: True
  PERCENTAGE: 1.0
  PSEUDOLABELS_CSV: "/mnt/rhome/paa/pedestrian/dataAugmentationMethods/LORA/diffusers/examples/text_to_image/peta_lora_32_with_transform_256_192_loss_train_model_21_reb_forlabeling_por2/generated.csv"
  PATH: "/mnt/rhome/paa/pedestrian/dataAugmentationMethods/LORA/diffusers/examples/text_to_image/peta_lora_32_with_transform_256_192_loss_train_model_21_reb_forlabeling_por2/generatedImgs/"


DATASET:
  TYPE: 'pedes'
  NAME: 'PETA'
  TRAIN_SPLIT: 'trainval'
  VAL_SPLIT: 'test'
  ZERO_SHOT: False
  LABEL: 'eval'
  HEIGHT: 256
  WIDTH: 192
  ROOT: '/mnt/rhome/paa/pedestrian/Rethinking_of_PAR/data/PETA/images/'

RELOAD:
  TYPE: False
  NAME: 'backbone'

BACKBONE:
  TYPE: 'resnet50'

